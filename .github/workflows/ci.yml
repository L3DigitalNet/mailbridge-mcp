name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" types-PyYAML
      - name: Lint
        run: ruff check .
      - name: Type check
        env:
          GITHUB_OAUTH_CLIENT_ID: test-ci-id
          GITHUB_OAUTH_CLIENT_SECRET: test-ci-secret
        run: mypy mailbridge_mcp/
      - name: Test
        env:
          GITHUB_OAUTH_CLIENT_ID: test-ci-id
          GITHUB_OAUTH_CLIENT_SECRET: test-ci-secret
        run: pytest --cov=mailbridge_mcp --cov-fail-under=35
