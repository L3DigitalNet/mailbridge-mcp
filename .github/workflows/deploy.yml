name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to LXC via Proxmox host
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LXC_HOST }}
          username: ${{ secrets.LXC_USER }}
          key: ${{ secrets.LXC_SSH_KEY }}
          script: |
            pct exec 111 -- bash -c '
              cd /opt/mailbridge-mcp &&
              git pull &&
              .venv/bin/pip install -e . --quiet &&
              systemctl restart mailbridge-mcp
            '
            sleep 10
            pct exec 111 -- curl -sf http://localhost:8765/health || exit 1
